<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptPerfector</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; text-align: center; background-color: #f4f7f6; color: #333; }
        h1 { color: #2c3e50; margin-bottom: 25px; }
        textarea { width: calc(100% - 22px); height: 120px; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; resize: vertical; }
        button { background-color: #3498db; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; transition: background-color 0.3s ease; }
        button:hover { background-color: #2980b9; }
        .output-container { margin-top: 30px; border-top: 1px dashed #ddd; padding-top: 25px; text-align: left; }
        .output-container h2 { color: #2c3e50; font-size: 22px; margin-bottom: 15px; }
        pre { background-color: #ecf0f1; padding: 15px; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; line-height: 1.6; color: #2d3436; font-size: 15px; }
        .loading { display: none; margin-top: 20px; font-style: italic; color: #555; }
    </style>
</head>
<body>
    <h1>PromptPerfector</h1>
    <p>Refine your AI prompts for superior results. Get clear, precise outputs every time.</p>
    <textarea id="rawPrompt" placeholder="Enter your raw AI prompt here (e.g., 'write an email about sales')"></textarea>
    <button onclick="perfectPrompt()">Perfect My Prompt</button>
    <p class="loading" id="loadingMessage">Perfecting your prompt...</p>
    <div class="output-container" id="outputContainer" style="display:none;">
        <h2>Perfected Prompt & Improvements</h2>
        <pre id="perfectedOutput"></pre>
        <button onclick="copyToClipboard()">Copy Perfected Prompt</button>
    </div>

    <script>
        async function perfectPrompt() {
            const rawPrompt = document.getElementById('rawPrompt').value;
            if (!rawPrompt.trim()) {
                alert('Please enter a prompt.');
                return;
            }
            document.getElementById('loadingMessage').style.display = 'block';
            document.getElementById('outputContainer').style.display = 'none';
            document.getElementById('perfectedOutput').innerText = '';

            try {
                // In a real app, this would call a Vercel Serverless Function
                // const response = await fetch('/api/perfect-prompt', {
                //     method: 'POST',
                //     headers: { 'Content-Type': 'application/json' },
                //     body: JSON.stringify({ prompt: rawPrompt })
                // });
                // const data = await response.json();

                // Mock API response for demonstration
                await new Promise(resolve => setTimeout(resolve, 2000)); // Simulate API call delay
                const mockResponse = {
                    perfected: "**Original Prompt:** 'write an email about sales'\n\n**Improvements:**\n1. **Detail Audience:** Who is the email for?
2. **Specify Goal:** What's the desired action?
3. **Add Product/Service Context:** What are you selling?\n\n**Revised Prompt:**\n'Draft a concise, engaging sales email targeting small business owners to introduce our new cloud-based CRM software. Highlight benefits like improved client management and increased sales efficiency. Include a clear call to action to schedule a free demo.'"
                };
                document.getElementById('perfectedOutput').innerText = mockResponse.perfected;
                document.getElementById('outputContainer').style.display = 'block';
            } catch (error) {
                console.error('Error perfecting prompt:', error);
                alert('Failed to perfect prompt. Please try again.');
            } finally {
                document.getElementById('loadingMessage').style.display = 'none';
            }
        }

        function copyToClipboard() {
            const textToCopy = document.getElementById('perfectedOutput').innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert('Perfected prompt copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy: ', err);
                alert('Failed to copy prompt.');
            });
        }
    </script>
</body>
</html>
